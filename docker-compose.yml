version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: vaidya_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vaidya}
      POSTGRES_USER: ${POSTGRES_USER:-vaidya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vaidya_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seeds/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./scripts/seeds/seed_demo.sql:/docker-entrypoint-initdb.d/02_seed_demo.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vaidya} -d ${POSTGRES_DB:-vaidya}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vaidya_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vaidya_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vaidya_net

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: vaidya_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vaidya}:${POSTGRES_PASSWORD:-vaidya_secret}@postgres:5432/${POSTGRES_DB:-vaidya}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      ENV: development
      # Comma-separated list — add your LAN IP or production domain here in .env
      # e.g. ALLOWED_ORIGINS=http://192.168.1.42:8081,https://myapp.com
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    networks:
      - vaidya_net

  # ── Celery worker (background tasks: ASHA alerts, follow-ups) ───────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: vaidya_celery
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vaidya}:${POSTGRES_PASSWORD:-vaidya_secret}@postgres:5432/${POSTGRES_DB:-vaidya}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    depends_on:
      - redis
      - postgres
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    networks:
      - vaidya_net

  # ── Celery Beat (scheduler: nightly aggregation, follow-up reminders) ───────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: vaidya_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vaidya}:${POSTGRES_PASSWORD:-vaidya_secret}@postgres:5432/${POSTGRES_DB:-vaidya}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    depends_on:
      - redis
    command: celery -A app.worker.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    networks:
      - vaidya_net

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vaidya_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - vaidya_net

  # ── Prometheus (metrics scraper) ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: vaidya_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
    networks:
      - vaidya_net

  # ── Grafana (metrics visualisation) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: vaidya_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_secret}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - vaidya_net

  # ── HashiCorp Vault (secrets management) ─────────────────────────────────────
  vault:
    image: hashicorp/vault:latest
    container_name: vaidya_vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-vaidya-vault-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    command: vault server -dev
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
      - ./vault/config:/vault/config:ro
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vaidya_net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  vault_data:

networks:
  vaidya_net:
    driver: bridge
