# =============================================================================
#  Vaidya — Nginx Production Configuration
#  Differences from nginx.dev.conf:
#    - /metrics restricted to Grafana server IP (not public)
#    - HSTS + security headers
#    - HTTP → HTTPS redirect
#    - Rate limiting at Nginx layer (second line of defence after Redis)
#    - /docs blocked in production
#    - Upload size limits per endpoint type
#    - Gzip compression for API responses
# =============================================================================
#
#  SSL certificates managed by Certbot:
#    certbot --nginx -d api.vaidya.health
#    Renewal cron: 0 12 * * * certbot renew --quiet --post-hook "nginx -s reload"
#
#  GRAFANA_SERVER_IP: set this to the actual Render internal IP of your
#    Grafana service. Use the Docker network address if self-hosted in the
#    same compose stack (e.g. 172.28.0.x) or the Render private IP.
#    Until set, /metrics is accessible from localhost only.
# =============================================================================

# Connection limiting — bots and scrapers
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Request rate limiting — 30 req/s burst, 10 req/s steady
# (Redis does the precise 60/min enforcement; this is the fast Nginx layer)
limit_req_zone  $binary_remote_addr zone=triage_limit:10m rate=30r/s;

events {
    worker_connections  2048;
    use                 epoll;
    multi_accept        on;
}

http {
    # ── Global settings ───────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    server_tokens       off;  # Do not expose Nginx version

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types        application/json text/plain text/css application/javascript;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream vaidya_api {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen      80;
        server_name api.vaidya.health;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen              443 ssl http2;
        server_name         api.vaidya.health;

        # ── SSL (managed by Certbot) ──────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/api.vaidya.health/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.vaidya.health/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ──────────────────────────────────────────────────
        # HSTS: 1 year, includeSubDomains
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Prevent MIME sniffing
        add_header X-Content-Type-Options    "nosniff" always;
        # Block framing (clickjacking)
        add_header X-Frame-Options           "DENY" always;
        # XSS protection (legacy browsers)
        add_header X-XSS-Protection          "1; mode=block" always;
        # Referrer policy — no referrer on cross-origin (protects patient GPS)
        add_header Referrer-Policy           "no-referrer" always;
        # CSP — API only serves JSON, no HTML; keep it tight
        add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'" always;
        # Permissions policy — no camera/mic/geoloc at the Nginx layer
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # ── Upload limits (vary by endpoint) ─────────────────────────────────
        # Default: block large bodies (API is JSON-only except upload endpoints)
        client_max_body_size 1M;

        # ── Rate limiting (Nginx layer) ───────────────────────────────────────
        limit_conn conn_per_ip 20;

        # ── /api/ — main proxy ────────────────────────────────────────────────
        location /api/ {
            limit_req zone=triage_limit burst=20 nodelay;

            # Audio/image uploads need larger body size
            location ~ ^/api/v1/(input/voice|diagnose/predict|diagnose/audio|diagnose/image) {
                client_max_body_size 16M;
                proxy_pass         http://vaidya_api;
                proxy_http_version 1.1;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_read_timeout 120s;
                proxy_send_timeout 120s;
            }

            proxy_pass         http://vaidya_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── /health — public, no rate limit ──────────────────────────────────
        location /health {
            proxy_pass http://vaidya_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;         # Don't log health probes — fills logs
        }

        # ── /metrics — RESTRICTED to Grafana server only ─────────────────────
        # IMPORTANT: replace 127.0.0.1 with your Grafana server's actual IP.
        # For Render internal networking, use the private IP (10.x.x.x range).
        # For local docker-compose Grafana, use: allow 172.0.0.0/8;
        location /metrics {
            proxy_pass http://vaidya_api/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            # IP allowlist — only Grafana scraper
            allow  127.0.0.1;           # localhost (dev)
            allow  10.0.0.0/8;          # Render private network
            allow  172.16.0.0/12;       # Docker internal network
            deny   all;                 # Block everything else

            access_log off;
        }

        # ── /docs — BLOCKED in production ────────────────────────────────────
        # FastAPI also sets docs_url=None when ENV=production,
        # but blocking at Nginx provides defence-in-depth.
        location /docs {
            return 403 "API documentation is not available in production.";
        }

        location /redoc {
            return 403;
        }

        location /openapi.json {
            return 403;
        }

        # ── Default — 404 for unknown paths ──────────────────────────────────
        location / {
            return 404 '{"error": "not_found"}';
            add_header Content-Type application/json always;
        }
    }
}
