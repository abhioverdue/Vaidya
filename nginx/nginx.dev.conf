events {
    worker_connections 1024;
}

http {
    upstream vaidya_api {
        server api:8000;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 15M;   # Allow audio/image uploads

        location /api/ {
            proxy_pass         http://vaidya_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass http://vaidya_api/health;
        }

        location /docs {
            proxy_pass http://vaidya_api/docs;
        }

        location /metrics {
            proxy_pass http://vaidya_api/metrics;
            allow 127.0.0.1;
            deny  all;
        }
    }
}
